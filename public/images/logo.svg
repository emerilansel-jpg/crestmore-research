<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" width="320" height="72" role="img" aria-label="Crestmore Research">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A843;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8861F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C8981E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E8C060;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8981E;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- ── CREST ICON (left, 60×60, centred at x=36 y=36) ── -->
  <!-- Shield outline -->
  <path d="M36 6 L60 14 L60 38 Q60 56 36 66 Q12 56 12 38 L12 14 Z"
        fill="none" stroke="url(#goldGradH)" stroke-width="1.6" />

  <!-- Inner shield ridge lines -->
  <line x1="36" y1="8" x2="36" y2="64" stroke="url(#goldGrad)" stroke-width="0.6" opacity="0.4"/>

  <!-- Mountain peaks inside shield -->
  <!-- Left peak -->
  <polyline points="18,46 28,26 36,38" fill="none" stroke="url(#goldGradH)" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Right peak (taller) -->
  <polyline points="28,46 36,24 44,38 54,46" fill="none" stroke="url(#goldGradH)" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Upward arrow / summit mark -->
  <line x1="36" y1="24" x2="36" y2="17" stroke="#D4A843" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="32.5,21 36,17 39.5,21" fill="none" stroke="#D4A843" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Shield top decorative corners -->
  <line x1="12" y1="14" x2="17" y2="14" stroke="url(#goldGrad)" stroke-width="1.2"/>
  <line x1="55" y1="14" x2="60" y2="14" stroke="url(#goldGrad)" stroke-width="1.2"/>

  <!-- ── WORDMARK (right of icon) ── -->
  <!-- CRESTMORE -->
  <text x="80" y="38"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="22"
        font-weight="700"
        letter-spacing="3"
        fill="#0a1628"
        dominant-baseline="middle">CRESTMORE</text>

  <!-- RESEARCH -->
  <text x="82" y="55"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="10.5"
        font-weight="400"
        letter-spacing="5.5"
        fill="#B8861F"
        dominant-baseline="middle">RESEARCH</text>

  <!-- Thin gold rule between name and tagline -->
  <line x1="80" y1="44.5" x2="314" y2="44.5" stroke="#D4A843" stroke-width="0.7" opacity="0.6"/>
</svg>
