name: Download Site Images
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  download-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all site images
        run: |
          mkdir -p public/images
          curl -sLf -A "Mozilla/5.0" "https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=1200&h=600&fit=crop&q=85" -o public/images/hero.jpg || curl -sL "https://picsum.photos/seed/crestmore-hero/1200/600" -o public/images/hero.jpg
          curl -sLf -A "Mozilla/5.0" "https://images.unsplash.com/photo-1497366216548-37526070297c?w=960&h=640&fit=crop&q=85" -o public/images/about-office.jpg || curl -sL "https://picsum.photos/seed/crestmore-office/960/640" -o public/images/about-office.jpg
          curl -sLf -A "Mozilla/5.0" "https://images.unsplash.com/photo-1497366811353-6870744d04b2?w=960&h=640&fit=crop&q=85" -o public/images/why-crestmore.jpg || curl -sL "https://picsum.photos/seed/crestmore-why/960/640" -o public/images/why-crestmore.jpg
          curl -sLf "https://randomuser.me/api/portraits/women/44.jpg" -o public/images/team-1.jpg || curl -sL "https://picsum.photos/seed/team1/300/300" -o public/images/team-1.jpg
          curl -sLf "https://randomuser.me/api/portraits/men/40.jpg" -o public/images/team-2.jpg || curl -sL "https://picsum.photos/seed/team2/300/300" -o public/images/team-2.jpg
          curl -sLf "https://randomuser.me/api/portraits/women/65.jpg" -o public/images/team-3.jpg || curl -sL "https://picsum.photos/seed/team3/300/300" -o public/images/team-3.jpg
          ls -lh public/images/
      - name: Commit images
        run: |
          git config user.email "emerilansel@gmail.com"
          git config user.name "Emeril Ansel"
          git add public/images/
          git diff --staged --quiet && echo "No images changed" || (git commit -m "chore: download site images for redesign" && git push)
